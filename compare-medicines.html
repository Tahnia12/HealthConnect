<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HealthConnect | Compare Medicines</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html" aria-label="Go to HealthConnect home">
        <span class="brand-badge">HC</span>
        <span class="brand-name">HealthConnect</span>
      </a>

      <nav class="nav">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link" href="choose-search.html">Search</a>
        <a class="nav-link" href="results.html">Results</a>
        <a class="nav-link" href="history.html">History</a>
        <a class="nav-link" href="saved.html">Saved</a>
        <a class="nav-link" href="disclaimer.html">Disclaimer</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <section class="card card-lg">
      <h1 class="h1">Compare Medicines</h1>

      <p class="lead">
        Select two medicines to compare their category, common uses, side effects and important notes side by side.
      </p>

      <p id="medicineCompareStatus" class="small">Loading medicines...</p>

      <div class="compare-controls">
        <div class="compare-control">
          <label class="label" for="medicineCompare1">Medicine 1</label>
          <select id="medicineCompare1" class="select">
            <option value="">Select first medicine</option>
          </select>
        </div>

        <div class="compare-control">
          <label class="label" for="medicineCompare2">Medicine 2</label>
          <select id="medicineCompare2" class="select">
            <option value="">Select second medicine</option>
          </select>
        </div>
      </div>

      <div class="actions" style="margin-top: 18px;">
        <button id="medicineCompareBtn" class="btn" type="button">Compare</button>
        <button id="medicineCompareClearBtn" class="btn btn-secondary" type="button">Clear</button>
      </div>

      <div id="medicineCompareResults" class="compare-grid" style="margin-top: 24px;"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-text">
        <strong>Disclaimer:</strong> Educational use only — not medical advice.
      </div>
      <a class="footer-link" href="disclaimer.html">Read full disclaimer</a>
    </div>
  </footer>

  <script src="js/medicines.js"></script>
</body>
</html>
