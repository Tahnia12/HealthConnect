<!doctype html>
<html lang="en">
<head>
  <!-- Basic page setup -->
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>HealthConnect | Results</title>

  <!-- Shared styling -->
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <!-- =========================================================
       HEADER / NAV (same layout)
       ========================================================= -->
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html" aria-label="Go to HealthConnect home">
        <span class="brand-badge">HC</span>
        <span class="brand-name">HealthConnect</span>
      </a>

      <nav class="nav">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link" href="search.html">Search</a>
        <a class="nav-link is-active" href="results.html">Results</a>
        <a class="nav-link" href="disclaimer.html">Disclaimer</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <section class="card card-lg">
      <h1 class="h1">Results</h1>

      <!-- Summary text is updated by app.js -->
      <p id="summary" class="small"></p>

      <!-- Results container (app.js injects cards into this) -->
      <div id="results"></div>

      <!-- Buttons -->
      <div class="actions" style="margin-top: 18px;">
        <a class="btn" href="search.html">New search</a>

        <!-- Clear button uses id="clearBtn" because your app.js searches for it -->
        <button id="clearBtn" class="btn btn-secondary" type="button">Clear</button>

        <!-- Disclaimer page -->
        <a class="btn btn-secondary" href="disclaimer.html">Read disclaimer</a>
      </div>
    </section>
  </main>

  <!-- Footer disclaimer -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-text">
        <strong>Disclaimer:</strong> Educational use only — not medical advice.
      </div>
      <a class="footer-link" href="disclaimer.html">Read full disclaimer</a>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
