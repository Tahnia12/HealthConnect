<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HealthConnect | Compare</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html" aria-label="Go to HealthConnect home">
        <span class="brand-badge">HC</span>
        <span class="brand-name">HealthConnect</span>
      </a>

      <nav class="nav">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link" href="choose-search.html">Search</a>
        <a class="nav-link" href="results.html">Results</a>
        <a class="nav-link" href="history.html">History</a>
        <a class="nav-link" href="saved.html">Saved</a>
        <a class="nav-link" href="disclaimer.html">Disclaimer</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <section class="card card-lg">
      <h1 class="h1">Compare Conditions</h1>

      <p class="lead">
        Select two conditions to compare their symptoms, body area and educational guidance side by side.
      </p>

      <p id="compareStatus" class="small">Loading conditions...</p>

      <div class="compare-controls">
        <div class="compare-control">
          <label class="label" for="compareOne">Condition 1</label>
          <select id="compareOne" class="select">
            <option value="">Select first condition</option>
          </select>
        </div>

        <div class="compare-control">
          <label class="label" for="compareTwo">Condition 2</label>
          <select id="compareTwo" class="select">
            <option value="">Select second condition</option>
          </select>
        </div>
      </div>

      <div class="actions" style="margin-top: 18px;">
        <button id="compareBtn" class="btn" type="button">Compare</button>
        <button id="clearCompareBtn" class="btn btn-secondary" type="button">Clear</button>
      </div>
    </section>

    <section class="compare-grid" id="compareGrid" style="display:none;">
      <div class="compare-panel">
        <div id="compareResultOne" class="result-item"></div>
      </div>

      <div class="compare-panel">
        <div id="compareResultTwo" class="result-item"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-text">
        <strong>Disclaimer:</strong> Educational use only — not medical advice.
      </div>
      <a class="footer-link" href="disclaimer.html">Read full disclaimer</a>
    </div>
  </footer>

  <script src="js/compare.js"></script>
</body>
</html>
